services:
  auth_service:
    build: ./auth-service
    env_file: 
    - ./auth-service/.env.docker
    restart: always
    volumes:
      - ./auth-service:/code
    ports:
      - "8000:8000"
    depends_on:
      - postgres_auth
  transaction_service:
    build: ./transaction-service
    env_file: 
    - ./transaction-service/.env.docker
    restart: always
    volumes:
      - ./transaction-service:/code
    ports:
      - "8001:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres_transaction:
        condition: service_started
  analytics_service:
    build: ./analytics-service
    env_file: 
    - ./analytics-service/.env.docker
    restart: always
    volumes:
      - ./analytics-service:/code
    ports:
      - "8002:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres_analytics:
        condition: service_started
  analytics_service_consumer:
    build: ./analytics-service
    env_file: 
    - ./analytics-service/.env.docker
    restart: always
    volumes:
      - ./analytics-service:/code
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres_analytics:
        condition: service_started
    command: python consumer.py
  postgres_auth:
    image: postgres:16-alpine
    container_name: ecoflow_auth_postgres_db
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    env_file: 
      - ./auth-service/.env
  postgres_transaction:
    image: postgres:16-alpine
    container_name: ecoflow_transaction_postgres_db
    restart: always
    ports:
      - "5433:5432"
    volumes:
      - postgres_transaction_data:/var/lib/postgresql/data
    env_file: 
      - ./transaction-service/.env
  postgres_analytics:
    image: postgres:16-alpine
    container_name: ecoflow_analytics_postgres_db
    restart: always
    ports:
      - "5434:5432"
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data
    env_file: 
      - ./analytics-service/.env
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ecoflow_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq:/var/lib/rabbitmq/data
    env_file: 
      - ./.env
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_auth_data:
  postgres_transaction_data:
  postgres_analytics_data:
  rabbitmq: